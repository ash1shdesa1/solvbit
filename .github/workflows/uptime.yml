name: Uptime

# Synthetic uptime + smoke check against production every 15 minutes.
# Verifies the site responds 200 and that key pages contain expected markers.
# Opens a GitHub issue if a check fails so you get notified automatically.
on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Probe key pages
        id: probe
        shell: bash
        run: |
          set +e
          BASE="${SITE_URL:-https://splatterimpacts.com}"
          declare -A pages=(
            ["/"]="Splatter"
            ["/shop"]="Shop targets"
          )
          fail=0
          report="Uptime check failed for the following URL(s):\n\n"
          for path in "${!pages[@]}"; do
            url="${BASE}${path}"
            body=$(curl -fsS --max-time 25 "$url")
            code=$?
            marker="${pages[$path]}"
            if [ $code -ne 0 ]; then
              report+="- ${url} — request failed (curl exit ${code})\n"
              fail=1
            elif ! grep -q "$marker" <<< "$body"; then
              report+="- ${url} — responded but missing expected marker \"${marker}\"\n"
              fail=1
            fi
          done
          echo "report<<EOF" >> "$GITHUB_OUTPUT"
          echo -e "$report" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          echo "fail=$fail" >> "$GITHUB_OUTPUT"
        env:
          SITE_URL: ${{ vars.SITE_URL }}
      - name: Open issue on failure
        if: steps.probe.outputs.fail == '1'
        uses: actions/github-script@v7
        with:
          script: |
            const body = `${{ steps.probe.outputs.report }}\n\nChecked at ${new Date().toISOString()} by the Uptime workflow.`;
            const title = "🚨 Site uptime check failed";
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              labels: "uptime",
            });
            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ["automated", "uptime"],
              });
            }
