name: Link Check

# Crawls the built site for broken internal/external links weekly and on demand.
# Opens (or updates) a single tracking issue when something breaks.
on:
  schedule:
    - cron: "30 8 * * 1" # Mondays 08:30 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  links:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Check links in built site
        id: lychee
        uses: lycheeverse/lychee-action@v2
        with:
          args: --no-progress --base dist "dist/**/*.html"
          fail: false
          output: ./lychee-report.md
      - name: Open issue on broken links
        if: steps.lychee.outputs.exit_code != 0
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "🔗 Broken links detected"
          content-filepath: ./lychee-report.md
          labels: automated, broken-links
